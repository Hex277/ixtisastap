<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sual səhifəsi | ixtisastap.com</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .main-content {
            margin-left: 0;
        }
        .left-menu-bg {
            visibility: hidden;
        }
        .logo {
            position: absolute;
            margin-left: 0px;
        }
        #confirmBtn {
            background-color: #1e90ff;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="left-menu-bg">
            <img src="../images/logo-crop.png" alt="logo">
            <div class="menu-bar">
                <a href="">Fənnlər</a>
                <a href="profile.html">Profil</a>
                <a href="aboutus.html">Haqqımızda və əlaqə</a>
                <a href="premium.html">Premium abunəlik</a>
            </div>
        </div>
        <div class="logo">
            <a href="./fennler-menu.html">
                <img id="center-logo" src="../images/logo-crop.png" alt="Main Menu">
            </a>
        </div>
        <div class="menu-btn-bg">
            <button id="menu-btn" onclick="toggleMobileMenu()">
                <img src="../images/menu-bar.webp" alt="Menyu">
            </button>
        </div>
        <div class="theme-mode">
            <button id="theme-btn"><img src="../images/moon.webp" alt="dark mode" id="theme-img"></button>
        </div>
        <a href="./profile.html" class="profile-bg">
            <img src="../images/profile.webp" alt="profile">
        </a>
        <a href="premium.html" id="premium-href">
            <div class="premium">
                <img src="../images/lightning.png" alt="premium">
                <p>Premium</p>
            </div>
        </a>
    </div>
    <div class="main-background">
        <div class="main-content">
            <div class="sual-bg">
                <div class="exit-bg">
                    <a href="fennler-menu.html" id="left-arrow">⬅</a>
                </div>
                <div class="top-part">
                    <div class="fenn-id">
                        <h1></h1>
                        <div class="sual-sayi">
                            <div id="timer-box">
                                <span id="timer-icon">⏰</span>
                                <span id="quiz-timer">00:00</span>
                            </div>
                            <span id="question-counter">1 / 5</span>
                        </div>
                    </div>
                    <div class="progress-bar">
                        <div id="progress-fill" style="width:0%; height:10px; border-radius:5px;"></div>
                    </div>
                </div>
                <div class="bottom-part">
                    <div class="sual-text-bg">
                        <p id="sual-text">SUAL</p>
                    </div>
                    <div class="sual-word">
                        <p id="question-text">Suallar tezliklə əlavə ediləcək.</p>
                    </div>
                    <div class="options" id="options-container">
                        
                    </div>
                    <div class="quiz-buttons-bg">
                        <button onclick="openReportFrame()" id="report"><img src="../images/report.png" alt="Bildir"></button>
                        <button id="evvelki-btn">Əvvəlki</button>
                        <button id="novbeti-btn">Növbəti</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="action-overlay" id="actionOverlay" style="display:none;">
        <div class="action-modal" id="actionModalContent">
            
        </div>
    </div>
    <div class="message-overlay" id="messageOverlay" style="display:none;">
        <div class="message-bar">
            <p id="messageText">This is a message!</p>
            <div class="message-buttons">
                <button id="okBtn">OK</button>
                <button id="cancelBtn" style="display:none;">Ləğv et</button>
                <button id="confirmBtn" style="display:none;">Təsdiqlə</button>
            </div>
        </div>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="..\theme.js"></script>
<script src="..\menu.js"></script>
<script src="script.js"></script>
</html>
